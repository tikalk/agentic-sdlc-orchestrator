---
# Development environment values for agentic-sdlc-runner

agentic-sdlc-runner:
  nameOverride: "agentic-sdlc-runner-dev"
  fullnameOverride: "agentic-sdlc-runner-dev"
  
  namespace:
    create: true
    name: agent-runner-dev
  
  serviceAccount:
    create: true
    annotations: {}
  
  externalSecret:
    enabled: true
    secretStore:
      name: gcp-dwh-dev-secret-store
      kind: ClusterSecretStore
    remoteRef:
      key: agentic-sdlc-dev-server-password
    refreshInterval: 10m
  
  pod:
    image:
      repository: gcr.io/dwh-dev-414206/agentic-sdlc-opencode
      pullPolicy: IfNotPresent
      tag: "0.1.0-dev"
    
    resources:
      limits:
        cpu: "1"
        memory: "2Gi"
      requests:
        cpu: "500m"
        memory: "1Gi"
    
    sshSecret:
      enabled: false
    
    nodeSelector: {}
    tolerations: []
    affinity: {}
  
  task:
    defaultRepo: ""
    defaultBranch: "main"
    defaultContextDir: "/workspace"
